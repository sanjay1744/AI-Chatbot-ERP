<div class="login-container">
  <div class="login-card">
    <!-- Logo -->
    <div class="logo-container">
      <span class="logo-text">AriyAI</span>
    </div>

    <!-- Title Header -->
    <div class="card-header">
      <h2>Welcome Back</h2>
      <p>Please sign in to your account</p>
    </div>

    <!-- Form -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="login-form">
      <div *ngIf="errorMessage" class="error-alert">
        <span class="alert-icon">⚠</span>
        <span class="alert-text">{{ errorMessage }}</span>
      </div>

      <!-- Username / Email Input -->
      <div class="form-group">
        <input 
          type="email" 
          id="email" 
          name="email" 
          [(ngModel)]="email" 
          placeholder="Username*" 
          required
          [disabled]="isLoading"
          autocomplete="username">
      </div>

      <!-- Password Input -->
      <div class="form-group password-group">
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          id="password" 
          name="password" 
          [(ngModel)]="password" 
          placeholder="Password*" 
          required
          [disabled]="isLoading"
          autocomplete="current-password">
        <button type="button" class="password-toggle" (click)="togglePasswordVisibility()">
          <!-- Slashed Eye SVG when hidden -->
          <svg *ngIf="!showPassword" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          <!-- Open Eye SVG when visible -->
          <svg *ngIf="showPassword" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <!-- Remember me & Forgot Password -->
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" name="rememberMe" [(ngModel)]="rememberMe">
          <span class="checkbox-box"></span>
          <span class="checkbox-label">Remember me</span>
        </label>
        <a href="javascript:void(0)" class="forgot-password">Forgot Password?</a>
      </div>

      <!-- Sign In Button -->
      <button type="submit" class="submit-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <!-- Social login divider -->
      <div class="divider">
        <span class="divider-text">Or continue with</span>
      </div>

      <!-- Social login buttons -->
      <div class="social-login">
        <button type="button" class="social-btn">
          <!-- Google Icon SVG -->
          <svg viewBox="0 0 24 24" width="18" height="18" class="social-icon">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.56-2.77c-.98.66-2.23 1.06-3.72 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button type="button" class="social-btn">
          <!-- Microsoft Icon SVG -->
          <svg viewBox="0 0 23 23" width="18" height="18" class="social-icon">
            <path d="M0 0h11v11H0z" fill="#F25022"/>
            <path d="M12 0h11v11H12z" fill="#7FBA00"/>
            <path d="M0 12h11v11H0z" fill="#00A4EF"/>
            <path d="M12 12h11v11H12z" fill="#FFB900"/>
          </svg>
          <span>Microsoft</span>
        </button>
      </div>

      <!-- Footer Sign Up Info -->
      <div class="form-footer">
        <span>Don't have an account? </span>
        <a href="javascript:void(0)" class="signup-link">Sign up</a>
      </div>

      <!-- Demo Info Helper (Subtle overlay) -->
      <div class="demo-helpers">
        <p>Demo Agents: <code>thalaimalai@ariyaitech.com</code> or <code>abhishek@ariyaitech.com</code></p>
        <p>Password: <code>password123</code></p>
      </div>
    </form>
  </div>
</div>
